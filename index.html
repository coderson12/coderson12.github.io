<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PianoVerse Multiplayer Keyboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>PianoVerse Keys</h1>
      <p>Press keys on your keyboard to play. Hold Shift for black notes.</p>
    </header>

    <main>
      <section id="players-section">
        <h2>Players</h2>
        <div class="card">
          <input id="player-name-input" type="text" placeholder="Enter your name">
          <button id="join-btn">Join Session</button>
        </div>
        <ul id="players-list"></ul>
      </section>

      <section id="piano-section">
        <h2>Piano</h2>
        <div id="piano-visual"></div>
        <p class="hint">Try keys: 1 2 3 4 5 6 7 8 9 0 - = q w e r ... m</p>
      </section>

      <section id="activity-section">
        <h2>Activity</h2>
        <ul id="activity-log"></ul>
      </section>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
