<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Beat Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Web Beat Studio</h1>
      <p>Create beats, upload your own sounds, and export your loop.</p>
    </header>

    <section id="controls">
      <div class="control-group">
        <label for="bpm">BPM</label>
        <input type="range" id="bpm" min="60" max="200" value="120">
        <span id="bpm-value">120</span>
      </div>
      <div class="control-group">
        <button id="play-btn">Play</button>
        <button id="stop-btn">Stop</button>
        <button id="export-btn">Export Loop</button>
      </div>
    </section>

    <section id="tracks">
      <!-- Tracks will be injected by JS -->
    </section>

    <footer>
      <p>Tip: Click steps to toggle them. Upload your own samples per track.</p>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
