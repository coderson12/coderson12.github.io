<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LearnAssist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>LearnAssist</h1>

    <!-- AUTH SECTION -->
    <div id="auth-section">
      <div class="card">
        <h2>Create Account</h2>
        <input id="signup-user" type="text" placeholder="Username">
        <input id="signup-pass" type="password" placeholder="Password">
        <button id="signup-btn">Sign Up</button>
        <p id="signup-msg" class="msg"></p>
      </div>

      <div class="card">
        <h2>Log In</h2>
        <input id="login-user" type="text" placeholder="Username">
        <input id="login-pass" type="password" placeholder="Password">
        <button id="login-btn">Log In</button>
        <p id="login-msg" class="msg"></p>
      </div>
    </div>

    <!-- GAME SECTION -->
    <div id="game-section" class="hidden">
      <div class="card">
        <h2>Welcome, <span id="player-name"></span></h2>
        <button id="start-btn">Start Quiz</button>
      </div>

      <div id="quiz-box" class="card hidden">
        <h2 id="question"></h2>
        <div id="options"></div>
        <button id="next-btn" class="hidden">Next</button>
      </div>

      <div id="result-box" class="card hidden">
        <h2>Results</h2>
        <p id="score"></p>
        <button id="restart-btn">Play Again</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
